[[site.quickstart.tab]]
label = "Use"
code = "import init, { process_events, compute_funnel, aggregate_metrics } from '@affectively/wasm-analytics-engine';\n\nawait init();\n\nconst processed = process_events(rawEvents);\nconst funnel = compute_funnel(events, ['signup', 'verify', 'purchase']);\nconst metrics = aggregate_metrics(events, ['pageviews', 'sessions']);"

[[site.faq]]
q = "What is wasm-analytics-engine?"
a = "A high-performance analytics engine written in Rust and compiled to WebAssembly. It handles metrics computation, event processing, aggregations, and funnel analysis at WASM speed."

[[site.faq]]
q = "How do I use it?"
a = "Install with npm install @affectively/wasm-analytics-engine, then call await init() to load the WASM module before using process_events, compute_funnel, and aggregate_metrics."

[[site.faq]]
q = "What functions does it expose?"
a = "process_events transforms raw event streams, aggregate_metrics computes count/sum/average aggregations, and compute_funnel calculates conversion funnels across ordered steps."

[[site.faq]]
q = "Can it run in Node as well as the browser?"
a = "Yes. The default build targets the web; a Node build is also available via wasm-pack with the nodejs target."

